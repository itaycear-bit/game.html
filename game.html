```html
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drive Survival X</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:#070712;
  font-family:Arial,sans-serif;
  color:white;
}
#game{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:linear-gradient(#1a1a35,#050509);
}
#road{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:340px;
  height:100vh;
  background:#333;
  border-left:5px solid #ff2d75;
  border-right:5px solid #00e5ff;
  overflow:hidden;
}
.line{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:10px;
  height:90px;
  background:white;
  border-radius:20px;
}
#player{
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  font-size:60px;
  z-index:10;
}
.enemy,.coin,.laser{
  position:absolute;
}
.enemy{font-size:55px}
.coin{font-size:34px}
.laser{
  width:8px;
  height:35px;
  background:#00e5ff;
  border-radius:20px;
  box-shadow:0 0 15px #00e5ff;
}
#hud{
  position:fixed;
  top:10px;
  left:10px;
  right:10px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  z-index:50;
}
.box{
  background:rgba(255,255,255,.15);
  padding:10px;
  border-radius:16px;
  text-align:center;
  font-weight:bold;
}
.screen{
  position:fixed;
  inset:0;
  background:linear-gradient(#15152a,#050509);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  z-index:100;
}
#gameOver{
  display:none;
}
.logo{
  font-size:110px;
}
button{
  border:0;
  background:#ff2d75;
  color:white;
  padding:15px 24px;
  border-radius:999px;
  font-size:17px;
  margin-top:10px;
}
.controls{
  position:fixed;
  bottom:20px;
  left:0;
  right:0;
  display:flex;
  justify-content:space-between;
  padding:0 24px;
  z-index:60;
  pointer-events:none;
}
.ctrl{
  width:70px;
  height:70px;
  border-radius:50%;
  background:rgba(255,255,255,.15);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  pointer-events:auto;
}
#shoot{
  position:fixed;
  bottom:105px;
  left:50%;
  transform:translateX(-50%);
  width:70px;
  height:70px;
  border-radius:50%;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  z-index:60;
}
</style>
</head>
<body>

<div id="game">
  <div id="road"></div>

  <div id="hud">
    <div class="box">🏁 <span id="score">0</span></div>
    <div class="box">🪙 <span id="coins">0</span></div>
    <div class="box">❤️ <span id="lives">3</span></div>
  </div>

  <div id="player">🏎️</div>

  <div class="controls">
    <div class="ctrl"
      ontouchstart="left=true"
      ontouchend="left=false"
      onmousedown="left=true"
      onmouseup="left=false">⬅️</div>

    <div class="ctrl"
      ontouchstart="right=true"
      ontouchend="right=false"
      onmousedown="right=true"
      onmouseup="right=false">➡️</div>
  </div>

  <div id="shoot" onclick="shootLaser()">🔫</div>
</div>

<div id="start" class="screen">
  <div class="logo">🏎️</div>
  <h1>Drive Survival X</h1>
  <p>תאסוף מטבעות ותתחמק ממכוניות.</p>
  <button onclick="startGame()">התחל משחק</button>
</div>

<div id="gameOver" class="screen">
  <div class="logo">💥</div>
  <h1>המשחק נגמר</h1>
  <p>הניקוד שלך: <span id="finalScore">0</span></p>
  <button onclick="restartGame()">שחק שוב</button>
</div>

<script>
const road=document.getElementById('road');
const player=document.getElementById('player');

let score=0;
let coins=0;
let lives=3;
let speed=5;
let running=false;

let playerX=window.innerWidth/2;
let left=false;
let right=false;

for(let i=0;i<9;i++){
  const line=document.createElement('div');
  line.className='line';
  line.style.top=(i*120)+'px';
  road.appendChild(line);
}

function updateUI(){
  document.getElementById('score').innerText=score;
  document.getElementById('coins').innerText=coins;
  document.getElementById('lives').innerText=lives;
}

function startGame(){
  document.getElementById('start').style.display='none';
  running=true;

  setInterval(createEnemy,900);
  setInterval(createCoin,700);

  requestAnimationFrame(loop);
}

function restartGame(){
  location.reload();
}

function bounds(){
  const left=(window.innerWidth-340)/2+35;
  const right=left+270;
  return {left,right};
}

function createEnemy(){
  if(!running)return;

  const e=document.createElement('div');
  e.className='enemy';
  e.innerText='🚓';

  const b=bounds();
  e.style.left=(b.left+Math.random()*220)+'px';
  e.style.top='-70px';

  document.getElementById('game').appendChild(e);
}

function createCoin(){
  if(!running)return;

  const c=document.createElement('div');
  c.className='coin';
  c.innerText='🪙';

  const b=bounds();
  c.style.left=(b.left+Math.random()*220)+'px';
  c.style.top='-50px';

  document.getElementById('game').appendChild(c);
}

function shootLaser(){
  const l=document.createElement('div');
  l.className='laser';
  l.style.left=playerX+'px';
  l.style.top=(window.innerHeight-150)+'px';
  document.getElementById('game').appendChild(l);
}

function hit(a,b){
  return a.bottom>b.top && a.top<b.bottom && a.left<b.right && a.right>b.left;
}

function loop(){
  if(!running)return;

  if(left)playerX-=7;
  if(right)playerX+=7;

  const b=bounds();

  if(playerX<b.left)playerX=b.left;
  if(playerX>b.right)playerX=b.right;

  player.style.left=playerX+'px';

  document.querySelectorAll('.line').forEach(line=>{
    let y=line.offsetTop+speed;
    if(y>window.innerHeight)y=-100;
    line.style.top=y+'px';
  });

  document.querySelectorAll('.enemy').forEach(e=>{
    let y=e.offsetTop+speed;
    e.style.top=y+'px';

    if(hit(e.getBoundingClientRect(),player.getBoundingClientRect())){
      e.remove();
      lives--;
      updateUI();

      if(lives<=0){
        endGame();
      }
    }

    if(y>window.innerHeight){
      e.remove();
      score++;
      updateUI();
    }
  });

  document.querySelectorAll('.coin').forEach(c=>{
    let y=c.offsetTop+speed;
    c.style.top=y+'px';

    if(hit(c.getBoundingClientRect(),player.getBoundingClientRect())){
      c.remove();
      coins++;
      score++;
      updateUI();
    }

    if(y>window.innerHeight)c.remove();
  });

  document.querySelectorAll('.laser').forEach(l=>{
    let y=l.offsetTop-12;
    l.style.top=y+'px';

    document.querySelectorAll('.enemy').forEach(e=>{
      if(hit(l.getBoundingClientRect(),e.getBoundingClientRect())){
        e.remove();
        l.remove();
        score+=3;
        updateUI();
      }
    });

    if(y<0)l.remove();
  });

  requestAnimationFrame(loop);
}

function endGame(){
  running=false;
  document.getElementById('finalScore').innerText=score;
  document.getElementById('gameOver').style.display='flex';
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')left=true;
  if(e.key==='ArrowRight')right=true;
  if(e.key===' ')shootLaser();
});

document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft')left=false;
  if(e.key==='ArrowRight')right=false;
});
</script>

</body>
</html>
