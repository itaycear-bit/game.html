<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drive Survival</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:radial-gradient(circle at top,#2d2d66,#090914 55%,#050509);
  color:white;
}

#game{
  width:100vw;
  height:100vh;
  position:relative;
  overflow:hidden;
}

#road{
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%);
  width:340px;
  height:100vh;
  background:linear-gradient(90deg,#1d1d27,#363646,#1d1d27);
  border-left:5px solid #ff2d75;
  border-right:5px solid #00e5ff;
  overflow:hidden;
  box-shadow:0 0 35px rgba(0,229,255,.28);
}

.line{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:10px;
  height:85px;
  background:#fff;
  border-radius:20px;
  box-shadow:0 0 14px #00e5ff;
}

#player{
  position:absolute;
  bottom:105px;
  left:50%;
  transform:translateX(-50%);
  font-size:62px;
  z-index:10;
  filter:drop-shadow(0 0 18px #00e5ff);
}

.enemy,.coin,.laser{
  position:absolute;
}

.enemy{
  font-size:54px;
  z-index:8;
  filter:drop-shadow(0 0 12px #ff2d75);
}

.coin{
  font-size:34px;
  z-index:8;
  filter:drop-shadow(0 0 10px gold);
}

.laser{
  width:8px;
  height:36px;
  background:#00e5ff;
  border-radius:20px;
  box-shadow:0 0 18px #00e5ff;
  z-index:9;
}

#hud{
  position:fixed;
  top:12px;
  left:10px;
  right:10px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  z-index:50;
}

.box{
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(10px);
  padding:10px;
  border-radius:16px;
  text-align:center;
  font-weight:900;
  font-size:14px;
}

.screen{
  position:fixed;
  inset:0;
  z-index:100;
  background:linear-gradient(180deg,#16162f,#050509);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:24px;
}

#gameOver{
  display:none;
}

.logo{
  font-size:110px;
  filter:drop-shadow(0 0 25px #00e5ff);
  animation:float 2s infinite;
}

@keyframes float{
  50%{transform:translateY(-12px)}
}

h1{
  font-size:44px;
  margin:10px;
}

p{
  color:#ddd;
  max-width:330px;
}

button{
  border:0;
  border-radius:999px;
  padding:15px 25px;
  font-size:17px;
  font-weight:900;
  background:linear-gradient(135deg,#ff2d75,#ff7aa2);
  color:white;
  cursor:pointer;
  margin-top:10px;
}

.controls{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:18px;
  z-index:60;
}

.ctrl{
  width:82px;
  height:82px;
  border-radius:24px;
  background:linear-gradient(135deg,#1f1f2d,#34344a);
  border:2px solid rgba(255,255,255,.12);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  box-shadow:0 12px 24px rgba(0,0,0,.35);
  user-select:none;
}

#shoot{
  position:fixed;
  bottom:115px;
  left:50%;
  transform:translateX(-50%);
  width:70px;
  height:70px;
  border-radius:50%;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  z-index:60;
  box-shadow:0 0 20px rgba(0,229,255,.4);
}

.pop{
  position:absolute;
  font-size:24px;
  font-weight:900;
  animation:pop .6s forwards;
  z-index:80;
}

@keyframes pop{
  from{opacity:1;transform:translateY(0) scale(1)}
  to{opacity:0;transform:translateY(-35px) scale(1.4)}
}
</style>
</head>

<body>

<div id="game">
  <div id="road"></div>

  <div id="hud">
    <div class="box">🏁 <span id="score">0</span></div>
    <div class="box">🪙 <span id="coins">0</span></div>
    <div class="box">❤️ <span id="lives">3</span></div>
  </div>

  <div id="player">🏎️</div>

  <div id="shoot" onclick="shootLaser()">🔫</div>

  <div class="controls">
    <div class="ctrl"
      ontouchstart="left=true"
      ontouchend="left=false"
      onmousedown="left=true"
      onmouseup="left=false">⬅️</div>

    <div class="ctrl"
      ontouchstart="right=true"
      ontouchend="right=false"
      onmousedown="right=true"
      onmouseup="right=false">➡️</div>
  </div>
</div>

<div id="start" class="screen">
  <div class="logo">🏎️</div>
  <h1>Drive Survival</h1>
  <p>תאסוף מטבעות, תתחמק ממכוניות ותירה בלייזר.</p>
  <button onclick="startGame()">התחל משחק</button>
</div>

<div id="gameOver" class="screen">
  <div class="logo">💥</div>
  <h1>המשחק נגמר</h1>
  <p>הניקוד שלך: <span id="finalScore">0</span></p>
  <button onclick="restartGame()">שחק שוב</button>
</div>

<script>
const road=document.getElementById("road");
const player=document.getElementById("player");

let score=0;
let coins=0;
let lives=3;

let speed=3.2;
let playerSpeed=5;

let playerX=window.innerWidth/2;
let left=false;
let right=false;
let running=false;

let enemyTimer;
let coinTimer;

for(let i=0;i<9;i++){
  const line=document.createElement("div");
  line.className="line";
  line.style.top=(i*125)+"px";
  road.appendChild(line);
}

function updateUI(){
  document.getElementById("score").innerText=score;
  document.getElementById("coins").innerText=coins;
  document.getElementById("lives").innerText=lives;
}

function startGame(){
  document.getElementById("start").style.display="none";
  resetGame();
  running=true;

  enemyTimer=setInterval(createEnemy,1100);
  coinTimer=setInterval(createCoin,850);

  requestAnimationFrame(loop);
}

function restartGame(){
  location.reload();
}

function resetGame(){
  score=0;
  coins=0;
  lives=3;
  speed=3.2;
  playerSpeed=5;
  playerX=window.innerWidth/2;
  updateUI();
}

function roadBounds(){
  const roadLeft=(window.innerWidth-340)/2;
  return {
    left:roadLeft+45,
    right:roadLeft+295
  };
}

function createEnemy(){
  if(!running)return;

  const enemy=document.createElement("div");
  enemy.className="enemy";
  enemy.innerText=["🚙","🚕","🚓","🚚"][Math.floor(Math.random()*4)];

  const b=roadBounds();
  enemy.style.left=(b.left+Math.random()*(b.right-b.left-45))+"px";
  enemy.style.top="-80px";

  document.getElementById("game").appendChild(enemy);
}

function createCoin(){
  if(!running)return;

  const coin=document.createElement("div");
  coin.className="coin";
  coin.innerText=Math.random()<0.18 ? "💎" : "🪙";
  coin.dataset.value=coin.innerText==="💎" ? 5 : 1;

  const b=roadBounds();
  coin.style.left=(b.left+Math.random()*(b.right-b.left-35))+"px";
  coin.style.top="-60px";

  document.getElementById("game").appendChild(coin);
}

function shootLaser(){
  if(!running)return;

  const laser=document.createElement("div");
  laser.className="laser";
  laser.style.left=playerX+"px";
  laser.style.top=(window.innerHeight-170)+"px";

  document.getElementById("game").appendChild(laser);
}

function hit(a,b){
  return a.bottom>b.top && a.top<b.bottom && a.left<b.right && a.right>b.left;
}

function pop(x,y,text){
  const p=document.createElement("div");
  p.className="pop";
  p.innerText=text;
  p.style.left=x+"px";
  p.style.top=y+"px";
  document.getElementById("game").appendChild(p);
  setTimeout(()=>p.remove(),600);
}

function loop(){
  if(!running)return;

  if(left)playerX-=playerSpeed;
  if(right)playerX+=playerSpeed;

  const b=roadBounds();

  if(playerX<b.left)playerX=b.left;
  if(playerX>b.right)playerX=b.right;

  player.style.left=playerX+"px";

  moveRoad();
  moveEnemies();
  moveCoins();
  moveLasers();

  requestAnimationFrame(loop);
}

function moveRoad(){
  document.querySelectorAll(".line").forEach(line=>{
    let y=line.offsetTop+speed;
    if(y>window.innerHeight)y=-100;
    line.style.top=y+"px";
  });
}

function moveEnemies(){
  document.querySelectorAll(".enemy").forEach(enemy=>{
    let y=enemy.offsetTop+speed;
    enemy.style.top=y+"px";

    if(hit(enemy.getBoundingClientRect(),player.getBoundingClientRect())){
      enemy.remove();
      lives--;
      pop(player.offsetLeft,player.offsetTop,"-1 ❤️");
      updateUI();

      if(lives<=0){
        endGame();
      }
    }

    if(y>window.innerHeight){
      enemy.remove();
      score++;
      updateUI();

      if(score%12===0){
        speed+=0.25;
      }
    }
  });
}

function moveCoins(){
  document.querySelectorAll(".coin").forEach(coin=>{
    let y=coin.offsetTop+speed;
    coin.style.top=y+"px";

    if(hit(coin.getBoundingClientRect(),player.getBoundingClientRect())){
      let val=Number(coin.dataset.value);
      coin.remove();

      coins+=val;
      score+=val;
      pop(coin.offsetLeft,coin.offsetTop,"+"+val+" 🪙");
      updateUI();
    }

    if(y>window.innerHeight){
      coin.remove();
    }
  });
}

function moveLasers(){
  document.querySelectorAll(".laser").forEach(laser=>{
    let y=laser.offsetTop-9;
    laser.style.top=y+"px";

    document.querySelectorAll(".enemy").forEach(enemy=>{
      if(hit(laser.getBoundingClientRect(),enemy.getBoundingClientRect())){
        enemy.remove();
        laser.remove();

        score+=3;
        coins+=2;
        pop(enemy.offsetLeft,enemy.offsetTop,"+3 💥");
        updateUI();
      }
    });

    if(y<0){
      laser.remove();
    }
  });
}

function endGame(){
  running=false;
  clearInterval(enemyTimer);
  clearInterval(coinTimer);

  document.getElementById("finalScore").innerText=score;
  document.getElementById("gameOver").style.display="flex";
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft")left=true;
  if(e.key==="ArrowRight")right=true;
  if(e.key===" ")shootLaser();
});

document.addEventListener("keyup",e=>{
  if(e.key==="ArrowLeft")left=false;
  if(e.key==="ArrowRight")right=false;
});
</script>

</body>
</html>
